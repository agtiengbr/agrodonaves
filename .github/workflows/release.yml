name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'base.php'
      - 'agrodonaves.php'

permissions:
  contents: write

jobs:
  auto-release:
    name: Auto release on version bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force --quiet

      - name: Resolve module version
        id: version
        run: |
          MODULE="${GITHUB_REPOSITORY##*/}"

          read_php_version() {
            sed -n "s/.*\$this->version[[:space:]]*=[[:space:]]*'\([^']*\)'.*/\1/p" "$1" 2>/dev/null | head -n1
          }

          VERSION="$(read_php_version base.php)"
          if [ -z "$VERSION" ]; then
            VERSION="$(read_php_version "${MODULE}.php")"
          fi
          if [ -z "$VERSION" ] && [ -f config.xml ]; then
            VERSION="$(sed -n 's:.*<version><!\[CDATA\[\(.*\)\]\]></version>.*:\1:p' config.xml)"
            VERSION="${VERSION:-$(sed -n 's:.*<version>\([^<]*\)</version>.*:\1:p' config.xml)}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Could not determine module version."
            exit 1
          fi

          echo "module=${MODULE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Module ${MODULE} version ${VERSION}"

      - name: Check if release already exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists. Nothing to release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New version detected: ${TAG}"
          fi

      - name: Build PrestaShop module ZIP
        if: steps.check.outputs.exists == 'false'
        run: |
          MODULE="${{ steps.version.outputs.module }}"
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="dist/${MODULE}-${VERSION}.zip"

          mkdir -p dist
          git archive --format=zip --prefix="${MODULE}/" --output="${ARCHIVE}" HEAD

          echo "Archive contents (first 30 entries):"
          unzip -l "${ARCHIVE}" | head -n 35

          if ! unzip -l "${ARCHIVE}" | grep -q "${MODULE}/${MODULE}.php"; then
            echo "Invalid archive: missing ${MODULE}/${MODULE}.php"
            exit 1
          fi

          echo "archive=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "Built ${ARCHIVE} ($(du -h "${ARCHIVE}" | cut -f1))"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ env.archive }}
          generate_release_notes: true
          fail_on_unmatched_files: true
